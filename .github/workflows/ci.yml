name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby-version: ["3.0", "3.1", "3.2", "3.3"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: supabase_auth_admin
          POSTGRES_PASSWORD: root
          POSTGRES_DB: supabase_auth
          POSTGRES_PORT: 5432
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Start GoTrue services
        run: docker compose -f infra/docker-compose.yml up -d

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Wait for GoTrue
        run: |
          for port in 9999 9998 9996 9997; do
            for i in $(seq 1 30); do
              curl -s http://localhost:$port/health && break || sleep 2
            done
          done

      - name: Run tests
        run: bundle exec rspec

      - name: Check coverage
        run: |
          coverage=$(ruby -e "require 'json'; data = JSON.parse(File.read('coverage/.last_run.json')); puts data['result']['line']")
          echo "Coverage: ${coverage}%"
          ruby -e "require 'json'; data = JSON.parse(File.read('coverage/.last_run.json')); exit 1 if data['result']['line'] < 88" || \
            (echo "Coverage below 88% threshold" && exit 1)
